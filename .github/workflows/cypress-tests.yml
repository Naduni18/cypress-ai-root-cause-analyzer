name: Cypress Tests With AI Failure Analysis

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cypress:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        id: cypress
        continue-on-error: true
        run: |
          npm run cy:run 2>&1 | tee cypress-run.log

      - name: Analyze failed tests with AI
        if: steps.cypress.outcome == 'failure'
        id: ai-analysis
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_MODEL: gpt-4.1
        run: npm run analyze:failures

      - name: Ensure AI analysis file exists
        if: always()
        run: |
          mkdir -p ai-analysis
          if [ ! -f ai-analysis/root-cause-analysis.json ]; then
            cat > ai-analysis/root-cause-analysis.json <<'JSON'
          {
            "likely_reason_for_failure": "AI analysis was not generated.",
            "classification": "unknown",
            "confidence": 0,
            "evidence": [
              "The file ai-analysis/root-cause-analysis.json did not exist before artifact upload.",
              "This can happen when Cypress passed, the analyzer step was skipped, OPENAI_API_KEY was missing, or the analyzer failed."
            ],
            "suggested_fix": "If Cypress failed, check the Analyze failed tests with AI step logs and confirm OPENAI_API_KEY is configured in GitHub Actions secrets.",
            "suggested_owner": "Needs triage"
          }
          JSON
          fi

      - name: Upload Cypress and AI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-ai-artifacts
          if-no-files-found: warn
          path: |
            cypress/screenshots
            cypress/videos
            cypress/results
            cypress-run.log
            ai-analysis/root-cause-analysis.json

      - name: Fail job if Cypress failed
        if: steps.cypress.outcome == 'failure'
        run: exit 1
